<!DOCTYPE html>
<html>

<head>
    <title>IoT High Voltage Generator</title>

    <link rel="stylesheet" href="style.css">

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background:
            linear-gradient(rgba(0,0,0,0.7),
            rgba(0,0,0,0.7)),

            url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200');

            background-size: cover;
            background-position: center;
        }

        .login-box {

            width: 380px;

            background: rgba(255,255,255,0.1);

            border: 1px solid rgba(255,255,255,0.2);

            backdrop-filter: blur(10px);

            padding: 40px;

            border-radius: 20px;

            text-align: center;

            color: white;

            box-shadow: 0 0 25px #00ffff;
        }

        .shock {
            font-size: 60px;
            color: yellow;
            animation: glow 1s infinite alternate;
        }

        @keyframes glow {

            from {
                text-shadow: 0 0 10px yellow;
            }

            to {
                text-shadow: 0 0 30px cyan;
            }
        }

        h1 {
            margin-top: 10px;
            font-size: 28px;
        }

        p {
            color: #ddd;
        }

        input {

            width: 90%;

            padding: 12px;

            margin: 12px 0;

            border: none;

            border-radius: 10px;

            outline: none;
        }

        .login-btn {

            width: 95%;

            padding: 12px;

            border: none;

            border-radius: 10px;

            background: cyan;

            color: black;

            font-size: 18px;

            cursor: pointer;

            font-weight: bold;
        }

        .login-btn:hover {
            background: yellow;
        }

        .bio-buttons {
            margin-top: 20px;
        }

        .bio-buttons button {

            padding: 12px 18px;

            margin: 8px;

            border: none;

            border-radius: 10px;

            background: #111827;

            color: white;

            cursor: pointer;

            font-size: 16px;
        }

        .bio-buttons button:hover {
            background: cyan;
            color: black;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <div class="shock">⚡</div>

        <h1>IoT High Voltage Generator</h1>

        <p>Smart Women Safety Wearable System</p>

        <input type="text" placeholder="Enter Name">

        <input type="password" placeholder="Enter Password">

        <button class="login-btn" onclick="login()">
            LOGIN
        </button>

        <div class="bio-buttons">

            <button>🔒 Fingerprint</button>

            <button>📷 Face ID</button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
